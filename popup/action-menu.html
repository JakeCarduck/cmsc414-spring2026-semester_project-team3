<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Menu</title>

    <link rel="stylesheet" href="style.css">
    <script src="action-menu.js" defer></script>
</head>

<body>
    <header>
        <img class="extension-logo" src="../icons/extension-logo.jpg" alt="Extension Logo">
        <h1 id="extension-name">Extension Name</h1>
    </header>

    <main>
        <h3>Extension Settings</h3>
        <div class="status-toggle">
            <span>Check to enable</span>
            <input type="checkbox" id="toggle">
        </div>
    </main>

</body>
</html>
